# GitHub Pages (Jekyll) configuration for the flux documentation site.
# Built from the /docs folder. Theme: just-the-docs (remote), with Mermaid enabled.
title: flux
description: A lightweight firewall GitOps automation skeleton for Palo Alto Networks Panorama.
remote_theme: just-the-docs/just-the-docs

url: https://t11z.github.io
baseurl: /flux

# Native Mermaid rendering for ```mermaid code blocks.
mermaid:
  version: "10.9.0"

color_scheme: dark
search_enabled: true

aux_links:
  "flux on GitHub":
    - "https://github.com/t11z/flux"
aux_links_new_tab: true

# These repo docs are not part of the rendered site nav; they are viewed on GitHub
# (the ADRs are validated against the smADR schema and must not carry theme front matter).
exclude:
  - decisions
  - IMPLEMENTATION-LOG.md
  - panorama-xpath-map.md
  - README.md
