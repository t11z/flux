# flux - GitOps delivery pipeline (skeleton).
#
# Drives Terraform (the official panos v2 provider, XML-API) against Panorama:
#   validate -> plan -> apply -> commit
#
# This template is intentionally inert (it lives under examples/ - see
# docs/decisions/0003-github-dev-gitlab-runtime.md). Copy it to your delivery repo's
# root as .gitlab-ci.yml and wire the runner + secrets described in README.md.
#
# By DEFAULT it targets the in-repo mock Panorama (mock/panorama_mock.py) so the whole
# pipeline runs end-to-end with no real device. To target a real Panorama, set
# PANOS_PROTOCOL=https + PANOS_HOSTNAME and provide credentials (see the secrets block).
#
# INBOUND TRIGGER: an ITSM workflow can start this pipeline for ONE use case via the
# GitLab trigger API (variables[FLUX_MODULE]=... plus variables[TF_VAR_*]=...). On a
# trigger run apply+commit run automatically (ITSM is the approval gate); a normal push
# behaves as before (all modules, manual apply/commit). See ITSM-TRIGGER.md.

stages: [validate, plan, apply, commit]

workflow:
  name: 'flux: $FLUX_MODULE ($CI_PIPELINE_SOURCE)'

variables:
  TF_ROOT: terraform
  TF_IN_AUTOMATION: "true"
  TERRAFORM_VERSION: "1.9.8"
  # --- use-case selector: "all" on a normal push; an ITSM trigger overrides it ---
  FLUX_MODULE: "all"
  TF_VAR_flux_module: "$FLUX_MODULE"
  # --- target: the mock by default; override for a real Panorama ---
  PANOS_HOSTNAME: "127.0.0.1"
  PANOS_PROTOCOL: "http"
  PANOS_PORT: "8080"
  TF_VAR_panos_hostname: "$PANOS_HOSTNAME"
  TF_VAR_panos_protocol: "$PANOS_PROTOCOL"
  TF_VAR_panos_port: "$PANOS_PORT"
  # TLS is VERIFIED by default. Only a self-signed lab Panorama needs to relax it:
  # set TF_VAR_panos_skip_verify_certificate=true AND PANOS_CURL_INSECURE=-k as
  # CI/CD variables for that environment. The default (mock) target is http, so
  # neither applies to it.
  TF_VAR_panos_skip_verify_certificate: "false"
  PANOS_CURL_INSECURE: ""

# The jobs need BOTH terraform and python3 (stdlib is enough for the mock/gate), plus curl.
# This default runs on gitlab.com shared runners out of the box: a Debian python image
# (stdlib XML/expat works — Alpine's apk python3 has an expat symbol skew that breaks
# xml.etree) plus a pinned terraform binary fetched in before_script. To use your own
# self-hosted runner image that already bundles terraform + python3 + curl, drop the
# before_script and set `image:` to that tag instead (see RUNNER-SETUP.md).
default:
  image: python:3.12-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends curl unzip ca-certificates >/dev/null
    - curl -fsSL "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip" -o /tmp/terraform.zip
    - unzip -oq /tmp/terraform.zip -d /usr/local/bin && terraform version

# ---------------------------------------------------------------------------
# Credentials. Pick ONE:
#  A) GitLab CI/CD variables: define masked TF_VAR_panos_api_key (or
#     TF_VAR_panos_username + TF_VAR_panos_password) in project settings.
#  B) Bitwarden Secrets Manager (free tier): uncomment .bws and the before_script
#     reference in the jobs that talk to Panorama. Needs BWS_ACCESS_TOKEN (masked)
#     and BWS_PANOS_KEY_ID (the secret's UUID) as CI/CD variables.
# ---------------------------------------------------------------------------
.bws: &bws
  - export TF_VAR_panos_api_key="$(bws secret get "$BWS_PANOS_KEY_ID" | jq -r '.value')"

# Start the mock in the background when targeting it (no-op for a real Panorama).
.start_mock: &start_mock
  - |
    if [ "$PANOS_PROTOCOL" = "http" ] && [ "$PANOS_HOSTNAME" = "127.0.0.1" ]; then
      python3 mock/panorama_mock.py --port "$PANOS_PORT" --log-file mock-audit.log &
      for i in $(seq 1 20); do curl -sf "http://127.0.0.1:$PANOS_PORT/api/?type=keygen&user=a&password=b" >/dev/null && break; sleep 0.5; done
      export TF_VAR_panos_api_key="flux-mock-key-0000000000000000000000000000"
    fi

# ---- validate: schema gate + terraform static checks (no device needed) ----
validate:
  stage: validate
  script:
    - python3 tools/test_validator.py          # the validate-before-apply schema gate
    - python3 mock/test_mock.py                 # mock <-> gate parity
    - cd "$TF_ROOT"
    - terraform init -backend=false
    - terraform fmt -check -recursive
    - terraform validate

# ---- plan: what would change on Panorama (only the selected use case on a trigger) ----
plan:
  stage: plan
  script:
    - echo "flux_module=$FLUX_MODULE source=$CI_PIPELINE_SOURCE"
    - *start_mock
    # - *bws            # uncomment for Bitwarden-sourced credentials
    - cd "$TF_ROOT"
    - terraform init
    - terraform plan -input=false -out=tfplan
  artifacts:
    paths: ["$TF_ROOT/tfplan"]
    expire_in: 1 day

# ---- apply: push the candidate config via the XML-API ----
# Auto-applies on an ITSM trigger run (ITSM is the approval gate); a normal push to
# main keeps the manual click. The CI_PIPELINE_SOURCE guard ensures a push can never
# auto-apply.
apply:
  stage: apply
  script:
    - *start_mock
    # - *bws
    - cd "$TF_ROOT"
    - terraform init
    - terraform apply -input=false -auto-approve tfplan
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $CI_COMMIT_REF_NAME == "main"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

# ---- commit: promote candidate -> running, then notify ITSM ----
commit:
  stage: commit
  script:
    - *start_mock
    # - *bws
    - |
      KEY="${TF_VAR_panos_api_key:?api key required}"
      BASE="$PANOS_PROTOCOL://$PANOS_HOSTNAME:$PANOS_PORT/api/"
      JOB=$(curl -s $PANOS_CURL_INSECURE -H "X-PAN-KEY: $KEY" --data-urlencode "type=op" \
            --data-urlencode "cmd=<commit></commit>" "$BASE" | sed -n 's:.*<job>\([0-9]*\)</job>.*:\1:p')
      echo "commit job $JOB"
      RESULT=$(curl -s $PANOS_CURL_INSECURE -H "X-PAN-KEY: $KEY" --data-urlencode "type=op" \
            --data-urlencode "cmd=<show><jobs><id>$JOB</id></jobs></show>" "$BASE" | grep -o '<result>[A-Z]*</result>')
      echo "commit result: $RESULT"
      echo "$RESULT" | grep -q OK
    # --- ITSM webhook stub: record the change on success ---
    - |
      if [ -n "$ITSM_WEBHOOK_URL" ]; then
        curl -sf -X POST "$ITSM_WEBHOOK_URL" -H 'Content-Type: application/json' \
          -d "{\"pipeline\":\"$CI_PIPELINE_URL\",\"commit\":\"$CI_COMMIT_SHA\",\"status\":\"committed\",\"module\":\"$FLUX_MODULE\"}"
      else
        echo "ITSM_WEBHOOK_URL not set - skipping change notification"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $CI_COMMIT_REF_NAME == "main"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
