name: Bug report
description: Report a defect
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Observed behaviour and how it diverges from expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Version, OS, runtime, relevant config.
    validations:
      required: false
