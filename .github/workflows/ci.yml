# CI for flux. The validator and its tests are Python stdlib-only (no network),
# so they run anywhere. The schema-drift check re-compiles the schema with
# PowerShell and compares it to the committed one SEMANTICALLY (JSON equality),
# so it is robust against serialization differences between Windows PowerShell
# 5.1 (developer) and Linux pwsh 7 (runner) — BOM, escaping, line endings.
# Actions pinned to commit SHAs (see references/action-pins.md); Dependabot
# keeps them current.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Validator regression tests
        run: python tools/test_validator.py

      - name: Mock server tests
        run: python mock/test_mock.py

  schema-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Re-compile schema
        shell: pwsh
        run: ./tools/build-schema.ps1 -OutFile $env:RUNNER_TEMP/rebuilt.json

      - name: Check for semantic drift
        run: |
          python - <<'PY'
          import json, os, sys
          committed = json.load(open("schema/panorama-schema.json", encoding="utf-8-sig"))
          rebuilt = json.load(open(os.path.join(os.environ["RUNNER_TEMP"], "rebuilt.json"), encoding="utf-8-sig"))
          if committed != rebuilt:
              print("Schema drift: committed schema differs from a fresh compile.", file=sys.stderr)
              sys.exit(1)
          print("No semantic schema drift.")
          PY

  # Static checks on the Terraform modules (panos v2). The full apply runs in the
  # GitLab delivery pipeline (ADR-0003); here we only fmt/validate the HCL so module
  # breakage (syntax, missing required_providers, variable typos) is caught on dev PRs.
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Format check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform -chdir=terraform init -backend=false

      - name: Validate
        run: terraform -chdir=terraform validate
