# Validates Structured MADR documents under docs/decisions/ against the smADR spec.
name: Validate ADRs

on:
  push:
    paths:
      - 'docs/decisions/**'
  pull_request:
    paths:
      - 'docs/decisions/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate Structured MADR
        uses: zircote/structured-madr@1885ace5d825e2b2982505e28468dd4f5ba1d1c0 # v1.2.0
        with:
          path: docs/decisions
          strict: 'false'
